name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

        #- name: macOS
        #  os: macos-latest

        #- name: iOS
        #  os: macos-latest
        #  target: iOS

        #- name: Android32
        #  os: ubuntu-latest
        #  target: Android32

        #- name: Android64
        #  os: ubuntu-latest
        #  target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Scoop # installing scoop because i dont trust winget
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm get.scoop.sh | iex
          echo "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Setup Geode
        run: |
          scoop bucket add extras
          scoop install geode-sdk-cli
          geode profile add --name helloWorld C:/ # dont need a profile but it refuses to run without one
          geode sdk install
          geode sdk install-binaries

      - name: Compile
        run: |
          cmake -B build
          cmake --build build --config RelWithDebInfo

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: .output/*